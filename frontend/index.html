<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChartPro • NSE Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #e0e0e0; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
    .stock-item { transition: background 0.15s; border-bottom: 1px solid #1a1a25; cursor: pointer; }
    .stock-item.active { background: #16213e; border-left: 4px solid #3b82f6; }
    .tf-btn { transition: all 0.2s; min-width: 36px; text-align: center; }
    .tf-btn.active { background: #2563eb; color: #fff; border-color: #3b82f6; }
    .green { color: #22c55e; } .red { color: #ef4444; }
    button, .stock-item { min-height: 44px; }
  </style>
</head>
<body class="flex flex-col h-screen">

  <div class="bg-[#0d0d14] px-3 py-2 flex items-center justify-between border-b border-gray-800">
    <span class="text-blue-400 font-bold text-base">◆ ChartPro</span>
    <div class="flex gap-1.5">
      <span id="source" class="text-[9px] text-green-400 self-center"></span>
      <button onclick="refreshStock()" class="bg-blue-600 text-white text-[11px] px-3 py-1.5 rounded-full font-medium">🔄</button>
    </div>
  </div>

  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="h-[45%] flex flex-col bg-[#0a0a0f]">
      <div class="px-3 py-2 border-b border-gray-800">
        <div class="flex justify-between items-start">
          <div>
            <h2 id="sym" class="text-base font-bold">—</h2>
            <p id="name" class="text-[10px] text-gray-500">—</p>
          </div>
          <div class="text-right">
            <div id="price" class="text-xl font-mono font-bold">₹—</div>
            <div id="change" class="text-xs font-semibold px-2 py-0.5 rounded">—</div>
          </div>
        </div>
        <div class="flex gap-3 text-[9px] text-gray-500 mt-1">
          <span>O:<span id="op" class="text-gray-300">—</span></span>
          <span>H:<span id="hi" class="text-gray-300">—</span></span>
          <span>L:<span id="lo" class="text-gray-300">—</span></span>
          <span>C:<span id="cl" class="text-gray-300">—</span></span>
        </div>
      </div>
      
      <div class="flex gap-1 px-2 py-1.5 border-b border-gray-800">
        <button onclick="setPeriod('1d')" id="t1d" class="tf-btn flex-1 py-1.5 rounded-full text-[10px] font-medium border border-gray-700 text-gray-400 active">1D</button>
        <button onclick="setPeriod('1w')" id="t1w" class="tf-btn flex-1 py-1.5 rounded-full text-[10px] font-medium border border-gray-700 text-gray-400">1W</button>
        <button onclick="setPeriod('1mo')" id="t1mo" class="tf-btn flex-1 py-1.5 rounded-full text-[10px] font-medium border border-gray-700 text-gray-400">1M</button>
        <button onclick="setPeriod('3mo')" id="t3mo" class="tf-btn flex-1 py-1.5 rounded-full text-[10px] font-medium border border-gray-700 text-gray-400">3M</button>
        <button onclick="setPeriod('1y')" id="t1y" class="tf-btn flex-1 py-1.5 rounded-full text-[10px] font-medium border border-gray-700 text-gray-400">1Y</button>
      </div>
      
      <div id="chart" class="flex-1" style="min-height:150px;"></div>
    </div>

    <div class="flex-1 flex flex-col bg-[#0d0d14] border-t-2 border-gray-800">
      <div class="px-3 py-2 border-b border-gray-800">
        <input type="text" id="search" placeholder="🔍 Search stocks..." class="w-full bg-[#1a1a25] border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500">
      </div>
      <div class="px-3 py-1.5 text-[9px] text-gray-500 grid grid-cols-12 border-b border-gray-800/50">
        <span class="col-span-3">SYMBOL</span>
        <span class="col-span-3 text-right">LTP</span>
        <span class="col-span-3 text-right">CHANGE</span>
        <span class="col-span-3 text-right">%</span>
      </div>
      <div id="list" class="flex-1 overflow-y-auto" style="-webkit-overflow-scrolling:touch;"></div>
    </div>
  </div>

<script>
// CHANGE THIS URL after deploying backend
const API = 'https://YOUR_BACKEND.onrender.com';
let stocks = [];
let active = 'RELIANCE';
let period = '1d';
let chart = null, series = null;

async function loadStocks() {
  try {
    const r = await fetch(API+'/stocks');
    stocks = (await r.json()).map(s => ({...s, price:0, change:0, cp:0}));
  } catch(e) {
    stocks = [{symbol:'RELIANCE',name:'Reliance',sector:'Oil & Gas'}];
  }
}

async function fetchQuote(sym) {
  const r = await fetch(API+'/quote/'+sym);
  return r.ok ? await r.json() : null;
}

async function fetchHistory(sym, p) {
  const r = await fetch(API+'/history/'+sym+'/'+p);
  return r.ok ? await r.json() : null;
}

function initChart() {
  if (chart) chart.remove();
  const el = document.getElementById('chart');
  chart = LightweightCharts.createChart(el, {
    layout: { background: { type:'solid', color:'#0a0a0f' }, textColor:'#c0c0c0' },
    grid: { vertLines: { color:'#1a1a25' }, horzLines: { color:'#1a1a25' } },
    crosshair: { mode: 1 },
    rightPriceScale: { borderColor:'#2a2a35', autoScale: true },
    timeScale: { borderColor:'#2a2a35', timeVisible: true },
    localization: { priceFormatter: p => '₹'+p.toFixed(2) },
    width: el.clientWidth, height: el.clientHeight,
  });
  series = chart.addCandlestickSeries({
    upColor:'#22c55e', downColor:'#ef4444',
    borderUpColor:'#22c55e', borderDownColor:'#ef4444',
    wickUpColor:'#22c55e', wickDownColor:'#ef4444',
  });
}

async function updateChart() {
  if (!chart) initChart();
  const data = await fetchHistory(active, period);
  if (!data?.candles?.length) return;
  series.setData(data.candles);
  chart.timeScale().fitContent();
  const c = data.candles;
  document.getElementById('op').textContent = '₹'+c[0].open.toFixed(2);
  document.getElementById('hi').textContent = '₹'+Math.max(...c.map(x=>x.high)).toFixed(2);
  document.getElementById('lo').textContent = '₹'+Math.min(...c.map(x=>x.low)).toFixed(2);
  document.getElementById('cl').textContent = '₹'+c[c.length-1].close.toFixed(2);
}

async function updateInfo() {
  const q = await fetchQuote(active);
  if (!q) return;
  document.getElementById('sym').textContent = q.symbol;
  document.getElementById('name').textContent = q.name;
  document.getElementById('price').textContent = '₹'+q.price.toLocaleString('en-IN',{minimumFractionDigits:2});
  const up = q.changePercent >= 0;
  document.getElementById('change').textContent = (up?'+':'')+q.changePercent.toFixed(2)+'%';
  document.getElementById('change').className = 'text-xs font-semibold px-2 py-0.5 rounded '+(up?'green bg-green-900/20':'red bg-red-900/20');
  document.getElementById('source').textContent = '● '+q.source;
}

async function refreshStock() {
  await updateInfo();
  await updateChart();
}

function renderList() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const list = document.getElementById('list');
  const f = stocks.filter(s => s.symbol.toLowerCase().includes(q)||s.name.toLowerCase().includes(q)).slice(0,100);
  list.innerHTML = f.map(s => {
    const a = s.symbol===active;
    const up = (s.cp||0)>=0;
    return `<div class="stock-item grid grid-cols-12 gap-1 px-3 py-2.5 text-xs items-center ${a?'active':''}" data-sym="${s.symbol}">
      <span class="col-span-3 font-bold text-white truncate text-[10px]">${s.symbol}</span>
      <span class="col-span-3 text-right font-mono text-[10px] text-gray-200">${s.price?'₹'+s.price.toLocaleString('en-IN',{minimumFractionDigits:2}):'—'}</span>
      <span class="col-span-3 text-right font-mono text-[9px] ${up?'green':'red'}">${s.change?((s.change>=0?'+':'')+s.change.toFixed(2)):'—'}</span>
      <span class="col-span-3 text-right"><span class="px-1.5 py-0.5 rounded-full text-[8px] ${up?'green bg-green-900/20':'red bg-red-900/20'}">${s.cp?((up?'+':'')+s.cp.toFixed(2)+'%'):'—'}</span></span>
    </div>`;
  }).join('');
  document.querySelectorAll('.stock-item').forEach(el => {
    el.addEventListener('click', async function() {
      active = this.dataset.sym;
      renderList();
      await updateInfo();
      await updateChart();
    });
  });
}

async function setPeriod(p) {
  period = p;
  ['1d','1w','1mo','3mo','1y'].forEach(x => document.getElementById('t'+x)?.classList.remove('active'));
  document.getElementById('t'+p)?.classList.add('active');
  await updateChart();
}

document.getElementById('search').addEventListener('input', renderList);
window.addEventListener('resize', () => {
  const el = document.getElementById('chart');
  if (chart && el) chart.applyOptions({width:el.clientWidth,height:el.clientHeight});
});

async function boot() {
  await loadStocks();
  initChart();
  renderList();
  await updateInfo();
  await updateChart();
}

boot();
</script>
</body>
</html>
